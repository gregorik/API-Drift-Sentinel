openapi: 3.0.3
info:
  title: Demo Orders API
  version: "2026-02"
paths:
  /orders:
    get:
      operationId: listOrders
      summary: List orders
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
        - in: query
          name: region
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                  next_cursor:
                    type: string
                    nullable: true
    post:
      operationId: createOrder
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customer_id
                - region
              properties:
                customer_id:
                  type: string
                region:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  created_at:
                    type: string
                    format: date-time
  /orders/{order_id}/cancel:
    parameters:
      - in: path
        name: order_id
        required: true
        schema:
          type: string
    post:
      operationId: cancelOrder
      summary: Cancel order
      responses:
        "202":
          description: Accepted
